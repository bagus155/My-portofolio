<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Back-end Developer</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/main.css" />

  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#FAF7F2',
            mint:     '#C8E6C9',
            'mint-soft': '#E8F5E9',
            lavender: '#D1C4E9',
            'lavender-soft': '#EDE7F6',
            blush:    '#F8BBD9',
            sage:     '#A5C9A5',
            plum:     '#7E57C2',
            ink:      '#2D2D2D',
            muted:    '#8A8A8A',
          },
          fontFamily: {
            sans:  ['Inter', 'sans-serif'],
            mono:  ['JetBrains Mono', 'monospace'],
          },
        }
      }
    }
  </script>
</head>

<body class="bg-cream text-ink font-sans antialiased overflow-x-hidden">

  <!-- ─── Floating Social Bar ─────────────────────────────── -->
  <aside id="social-bar" aria-label="Social Links">
    <!-- Injected by content.js -->
  </aside>

  <!-- ─── Navigation ──────────────────────────────────────── -->
  <header id="nav" role="banner">
    <!-- Injected by content.js -->
  </header>

  <main>
    <!-- ─── Hero Section ──────────────────────────────────── -->
    <section id="hero" aria-label="Introduction">
      <!-- Injected by content.js -->
    </section>

    <!-- ─── About / Philosophy ────────────────────────────── -->
    <section id="about" aria-label="About">
      <!-- Injected by content.js -->
    </section>

    <!-- ─── Expertise ─────────────────────────────────────── -->
    <section id="expertise" aria-label="Expertise">
      <!-- Injected by content.js -->
    </section>

    <!-- ─── Data Flow Visual ───────────────────────────────── -->
    <section id="dataflow" aria-label="How I Work">
      <!-- Injected by content.js -->
    </section>

    <!-- ─── Projects ──────────────────────────────────────── -->
    <section id="projects" aria-label="Projects">
      <!-- Injected by content.js -->
    </section>

    <!-- ─── Contact ───────────────────────────────────────── -->
    <section id="contact" aria-label="Contact">
      <!-- Injected by content.js -->
    </section>
  </main>

  <!-- ─── Footer ────────────────────────────────────────── -->
  <footer id="footer" role="contentinfo">
    <!-- Injected by content.js -->
  </footer>

  <!-- ─── Entry Point ───────────────────────────────────── -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
